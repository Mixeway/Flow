# Backend image: feature/* → *-test tags only; main → latest + latest-test in parallel
name: Docker Build and Push (backend)

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - '.github/workflows/docker-build-backend.yml'

concurrency:
  group: docker-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-testing:
    runs-on: ubuntu-latest
    # Profile ut normally uses Testcontainers (Docker). CI uses a real Postgres service so tests
    # do not depend on Testcontainers detecting the Docker socket on the runner.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 22
      - name: Build and test with Maven and profile ut
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
        run: |
          cd backend
          mvn clean test -Dspring.profiles.active=ut

  # feature/* — single image, tag …-test
  build-and-push-backend-test-branch:
    if: startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    needs: unit-testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (test tag)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: mixeway/flow-api:${{ github.sha }}-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # main — release tags (no -test suffix)
  build-and-push-backend-main-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: unit-testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (release tags)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: mixeway/flow-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # main — parallel: same image, -test tag
  build-and-push-backend-main-test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: unit-testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (test tag)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: mixeway/flow-api:latest-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
