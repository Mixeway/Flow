<c-row>
    <c-col [md]="7" [sm]="12">
        <app-file-upload (fileSelected)="onFileUploaded($event)"></app-file-upload>
    </c-col>
    <c-col [md]="5" [sm]="12">
        <button
                color="primary"
                cButton
                class="btn-with-icon"
                [disabled]="!canUpload"
                (click)="uploadFile()">
            <svg cIcon name="cil-user-plus"></svg>
            <span>Upload data</span>
        </button>
    </c-col>
