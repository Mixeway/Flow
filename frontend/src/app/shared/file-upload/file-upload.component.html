<div class="file-upload-container">
  <div
    class="drop-zone"
    [class.dragging]="isDragging"
    [class.has-file]="selectedFile"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)">

    <div *ngIf="!selectedFile" class="upload-prompt">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <p class="primary-text">Drag and drop your file here</p>
      <p class="secondary-text">or</p>
      <label class="file-input-label">
        <input
          type="file"
          (change)="onFileSelected($event)"
          class="file-input"
          #fileInput>
        <button type="button" class="browse-button" (click)="fileInput.click()">
          Browse Files
        </button>
      </label>
    </div>

    <div *ngIf="selectedFile" class="file-info">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
        <polyline points="13 2 13 9 20 9"></polyline>
      </svg>
      <p class="file-name">{{ selectedFile.name }}</p>
      <p class="file-size">{{ (selectedFile.size / 1024).toFixed(2) }} KB</p>
      <button type="button" class="remove-button" (click)="clearFile()">
        Remove
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="error-message">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <span>{{ errorMessage }}</span>
  </div>
</div>
